<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaju Flower Shop - Web Dev Assignment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white text-gray-800 font-sans antialiased">

    <header class="border-b border-gray-100 sticky top-0 bg-white z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                
                <div class="flex-shrink-0 flex items-center gap-2">
                    <i data-lucide="flower-2" class="h-6 w-6 text-red-500"></i>
                    <span class="font-serif text-2xl font-bold tracking-wide text-gray-900">Kaju</span>
                </div>

                <nav class="hidden md:flex space-x-8 font-medium text-sm text-gray-600 tracking-wide uppercase">
                    <a href="#" class="text-red-500 transition-colors">Home</a>
                    <a href="#" class="hover:text-red-500 transition-colors">Shop</a>
                    <a href="#" class="hover:text-red-500 transition-colors">Pages</a>
                    <a href="#" class="hover:text-red-500 transition-colors">Blog</a>
                    <a href="#" class="hover:text-red-500 transition-colors">Contact</a>
                </nav>

                <div class="flex items-center space-x-5 text-gray-700">
                    <button class="hover:text-red-500 transition-colors">
                        <i data-lucide="search" class="h-5 w-5"></i>
                    </button>
                    <button class="hover:text-red-500 transition-colors">
                        <i data-lucide="user" class="h-5 w-5"></i>
                    </button>
                    <button class="hover:text-red-500 transition-colors relative">
                        <i data-lucide="shopping-bag" class="h-5 w-5"></i>
                        <span class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] font-bold rounded-full h-4 w-4 flex items-center justify-center">0</span>
                    </button>
                    
                    <button class="md:hidden hover:text-red-500 transition-colors">
                        <i data-lucide="menu" class="h-6 w-6"></i>
                    </button>
                </div>

            </div>
        </div>
    </header>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
